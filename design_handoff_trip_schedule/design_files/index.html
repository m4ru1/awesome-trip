<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>旅行课程表 · 京都赏枫 5 日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cn-fontsource-smiley-sans-oblique-regular@1.0.1/font.css" />
  <style>
:root {
  --c-sight: #FF8A4C;  --c-sight-soft: rgba(255,138,76,.12);
  --c-meal:  #F5A300;  --c-meal-soft:  rgba(245,163,0,.12);
  --c-rest:  #15B8A6;  --c-rest-soft:  rgba(21,184,166,.12);
  --c-transport: #4C7DFF; --c-transport-soft: rgba(76,125,255,.12);
  --c-free:  #A66BFF;  --c-free-soft:  rgba(166,107,255,.12);
  --paper: #FFF8F0; --paper-2: #FBEFE2; --card: #FFFFFF;
  --ink: #2B2D33; --ink-2: #7A7E87; --ink-3: #B4B7BE;
  --brand: #FF6B5C; --brand-d: #ED5546; --line: #ECE2D6;
  --r-card: 20px; --r-btn: 14px; --r-pill: 999px;
  --font-cn-title: "Smiley Sans", "Noto Sans SC", system-ui, sans-serif;
  --font-cn-body: "Noto Sans SC", system-ui, sans-serif;
  --font-num: "Fredoka", "Nunito", system-ui, sans-serif;
  --font-latin: "Nunito", system-ui, sans-serif;
  --shadow-soft: 0 6px 20px rgba(75,55,40,.10);
  --shadow-pop: 0 10px 30px rgba(75,55,40,.16);
  --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-cn-body); color: var(--ink); background-color: var(--paper);
  background-image: radial-gradient(rgba(150,110,70,.06) 1.1px, transparent 1.1px);
  background-size: 22px 22px; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden;
}
#root { height: 100%; }
.num { font-family: var(--font-num); font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: .2px; }
.title-cn { font-family: var(--font-cn-title); font-style: italic; letter-spacing: .5px; }
.t-sight { --tc: var(--c-sight); --tc-soft: var(--c-sight-soft); }
.t-meal  { --tc: var(--c-meal);  --tc-soft: var(--c-meal-soft); }
.t-rest  { --tc: var(--c-rest);  --tc-soft: var(--c-rest-soft); }
.t-transport { --tc: var(--c-transport); --tc-soft: var(--c-transport-soft); }
.t-free  { --tc: var(--c-free);  --tc-soft: var(--c-free-soft); }
.chip {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--r-pill);
  font-size: 12.5px; font-weight: 600; line-height: 1.5; white-space: nowrap;
}
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: #E3D4C2; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: #D5C2AB; background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }
.btn {
  font-family: var(--font-cn-body); border: none; cursor: pointer; border-radius: var(--r-btn);
  font-size: 14px; font-weight: 700; padding: 10px 16px;
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  transition: transform .18s var(--ease-spring), box-shadow .2s, background .2s;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--brand); color: #fff; box-shadow: 0 6px 16px rgba(255,107,92,.32); }
.btn-primary:hover { background: var(--brand-d); }
.btn-ghost { background: #fff; color: var(--ink); box-shadow: var(--shadow-soft); }
.btn-ghost:hover { background: #FFFBF6; }
.btn-soft { background: var(--paper-2); color: var(--ink); }
.btn-soft:hover { background: #F5E6D5; }
.sticker { background: #fff; border: 2px solid #fff; box-shadow: 0 4px 12px rgba(75,55,40,.18); border-radius: var(--r-pill); }
@keyframes floatIn { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.float-in { animation: floatIn .42s var(--ease-spring) both; }
@keyframes popCheck { 0% { transform: scale(0); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
@keyframes pulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,92,0); } 50% { box-shadow: 0 0 0 5px rgba(255,107,92,.18); } }
.conflict-pulse { animation: pulseRed 1.6s ease-in-out infinite; }
@keyframes flipSwap { 0% { transform: rotateY(0) scale(1); } 50% { transform: rotateY(-12deg) scale(.96); opacity:.6; } 100% { transform: rotateY(0) scale(1); opacity:1; } }
.flip-swap { animation: flipSwap .42s var(--ease-spring); }
@keyframes drawerIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes sheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes rollNum { from { transform: translateY(40%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.roll-num { animation: rollNum .4s var(--ease-spring); display: inline-block; }
.dragging { opacity: .5; }
.drop-target { outline: 3px dashed var(--tc, var(--brand)); outline-offset: 3px; border-radius: 16px; background: var(--tc-soft, rgba(255,107,92,.06)); }
.clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.img-placeholder {
  background-color: var(--tc-soft, #f0e8de);
  background-image: repeating-linear-gradient(45deg, rgba(0,0,0,.035) 0 8px, transparent 8px 16px);
  display: flex; align-items: center; justify-content: center;
}
.no-select { user-select: none; -webkit-user-select: none; }
body.tl-dragging { user-select: none; -webkit-user-select: none; cursor: grabbing; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 数据 & 工具（普通脚本） -->
  <script src="data.js"></script>
  <script src="util.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- 组件（按依赖顺序） -->
  <script type="text/babel" src="cards.jsx"></script>
  <script type="text/babel" src="panels.jsx"></script>
  <script type="text/babel" src="editor.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="trip.jsx"></script>
  <script type="text/babel" src="grid.jsx"></script>
  <script type="text/babel" src="timeline.jsx"></script>
  <script type="text/babel" src="planb.jsx"></script>
  <script type="text/babel" src="share.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <template id="__bundler_thumbnail">

      <rect width="100" height="100" fill="#FFF8F0"/>
      <rect x="22" y="22" width="16" height="22" rx="3" fill="#FF8A4C"/>
      <rect x="42" y="22" width="16" height="34" rx="3" fill="#F5A300"/>
      <rect x="62" y="22" width="16" height="16" rx="3" fill="#15B8A6"/>
      <rect x="42" y="60" width="16" height="18" rx="3" fill="#4C7DFF"/>
      <text x="50" y="92" font-size="9" text-anchor="middle" fill="#FF6B5C" font-family="sans-serif" font-weight="bold">🍁 课程表</text>
    </svg>
  </template>
</body>
</html>
